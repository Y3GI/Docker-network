services:

  # Router / Firewall / IDS
  rtr:
    image: alpine:3.20
    container_name: rtr
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
    volumes:
      - ./suricata:/etc/suricata:ro
      - ./logs/suricata:/var/log/suricata
      - ./nftables.conf:/etc/nftables.conf:ro
    command: >
      /bin/sh -c "
      apk add --no-cache nftables suricata tcpdump iproute2;
      systctl -w net.ipv4.ip_forward=1;
      echo 'Loading nftables rules...';
      nft flush ruleset;
      nft -f /etc/nftables.conf;
      echo 'Starting Suricata IDS...';
      rm -f /var/run/suricata.pid;
      suricata -c /etc/suricata/suricata.yaml -i eth1 -i eth2 -D;
      tail -f /var/log/suricata/suricata.log"
    dns:
      - 172.30.20.200
    networks:
      wan_net:
        ipv4_address: 172.30.99.201
      dmz_net:
        ipv4_address: 172.30.10.201
      internal_net:
        ipv4_address: 172.30.20.201

  # CoreDNS Server
  dns:
    image: coredns/coredns:latest
    container_name: dns
    networks:
      dmz_net:
        ipv4_address: 172.30.10.200
      internal_net:
        ipv4_address: 172.30.20.200
      wan_net:
        ipv4_address: 172.30.99.200
    extra_hosts:
      - "rtr:172.30.20.201"
    volumes:
      - ./Corefile:/Corefile:ro
    command: -conf /Corefile

  # DMZ reverse proxy and Apache web server
  proxy:
    image: traefik:v3.1
    container_name: proxy
    ports:
      - "8880:80"ss
      - "8443:443"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    dns:
      - 172.30.10.200
    networks:
      dmz_net:
        aliases:
          - proxy.dmz
    extra_hosts:
      - "rtr:172.30.10.201"
    depends_on:
      - app_public

  app_public:
    image: httpd:latest
    container_name: app_public
    networks:
      dmz_net:
        aliases:
          - app.dmz
    dns:
      - 172.30.10.200
    extra_hosts:
      - "rtr:172.30.10.201"
    volumes:
      - ./html:/usr/local/apache2/htdocs:ro

  # Internal web service
  app_internal:
    image: nginx:alpine
    container_name: app_internal
    networks:
      internal_net:
        aliases:
          - app.internal
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"

  # WireGuard VPN
  vpn:
    image: linuxserver/wireguard
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - SERVERURL=auto
      - SERVERPORT=51820
      - PEERS=alice
      - PEERDNS=1.1.1.1
      - INTERNAL_SUBNET=172.30.20.0/24
    volumes:
      - ./wg:/config
    dns:
      - 172.30.20.200
    networks:
      - wan_net
      - internal_net
    extra_hosts:
      - "rtr:172.30.20.201"

  # Wazuh SIEM (manager only)
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.1
    container_name: wazuh.manager
    networks:
      internal_net:
        aliases:
          - wazuh.internal
    ports:
      - "1514:1514/udp"
      - "1515:1515"
    environment:
      - WAZUH_LOGLEVEL=info
      - DISABLE_FILEBEAT=true
    volumes:
      - ./wazuh_config:/var/ossec/etc
      - ./logs:/var/log/suricata:ro
      - ./logs/wazuh:/var/log/wazuh
      - ./logs/wazuh:/var/ossec/logs
      - ./disable-filebeat:/etc/services.d/filebeat
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      internal_net:
        aliases:
          - prometheus.internal
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    networks:
      internal_net:
        aliases:
          - loki.internal
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    ports:
      - "9080:9080"
    volumes:
      - ./logs/wazuh:/var/log/wazuh:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      internal_net:
        aliases:
          - promtail.internal
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"
    labels:
      - "traefik.enable=false"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    depends_on:
      - prometheus
      - loki
    networks:
      internal_net:
        aliases:
          - grafana.internal
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    dns:
      - 172.30.20.200
    extra_hosts:
      - "rtr:172.30.20.201"

volumes:
  grafana_data:

networks:
  wan_net:
    driver: macvlan
    driver_opts:
      parent: dummy0
    ipam:
      driver: default
      config:
        - subnet: "172.30.99.0/24"
          gateway: 172.30.99.201
  dmz_net:
    driver: macvlan
    driver_opts:
      parent: dummy0
    ipam:
      driver: default
      config:
        - subnet: "172.30.10.0/24"
          gateway: 172.30.10.201
  internal_net:
    driver: macvlan
    driver_opts: 
      parent: dummy0
    ipam:
      driver: default
      config:
        - subnet: "172.30.20.0/24"
          gateway: 172.30.20.201

configs:
  nftables_conf:
    file: ./nftables.conf